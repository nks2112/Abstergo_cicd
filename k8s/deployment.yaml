apiVersion: apps/v1
kind: Deployment
metadata:
  name: abstergo-deployment
  labels:
    app: abstergo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abstergo-app   # MUST always match template labels
  template:
    metadata:
      labels:
        app: abstergo-app
    spec:
      containers:
        - name: abstergo-app
          image: navesing2112/abstergo-app:latest   # replace dynamically in pipeline
          ports:
            - containerPort: 3000
